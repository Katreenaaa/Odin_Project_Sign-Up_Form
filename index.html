<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ODIN FORM</title>
    <link rel="stylesheet" href="form.css" />
  </head>
  <body>
    <div class="container">
      <div class="sidebar">
        <div class="logo">
          <img src="./assets/images/odin-lined.png" />
          <span>ODIN</span>
        </div>
      </div>

      <div class="main-content">
        <p>
          <b>
            This is not a real online service! You know you need something like
            this in your life to help you realize your deepest dreams.</b
          >
        </p>
        <p><b>Sign Up now to get started.</b></p>
        <p><b>You know you want to.</b></p>

        <form action="" method="post">
          <h3>Let's do this!</h3>

          <div class="inputs">
            <div class="form-control">
              <label for="first-name">FIRST NAME</label>
              <input
                type="text"
                id="first-name"
                name="first-name"
                placeholder="John"
                required
              />
            </div>

            <div class="form-control">
              <label for="last-name">LAST NAME</label>
              <input
                type="text"
                id="last-name"
                name="last-name"
                placeholder="Doe"
                required
              />
            </div>

            <div class="form-control">
              <label for="email">EMAIL</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="example@email.com"
                required
              />
            </div>

            <div class="form-control">
              <label for="phone-number">PHONE NUMBER</label>
              <input
                type="tel"
                id="phone-number"
                name="phone-number"
                placeholder="(555) 555-5555"
                required
              />
            </div>

            <div class="form-control">
              <label for="password">PASSWORD</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="●●●●●●●●●"
                required
              />
            </div>

            <div class="form-control">
              <label for="confirm-password">CONFIRM PASSWORD</label>
              <input
                type="password"
                id="confirm-password"
                name="confirm-password"
                placeholder="●●●●●●●●●"
                required
              />
            </div>
          </div>
        </form>

        <div class="submit-button">
          <button type="submit">Create Account</button>
        </div>

        <p class="log-in">
          Already have an account? <span> <a href="">Log in</a> </span>
        </p>
      </div>
    </div>
  </body>
</html>
